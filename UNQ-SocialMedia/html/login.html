<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header id="main-header"></header>
    
    
        <main>
            <div id="flotante-login">
                <h3>Iniciar secion</h3>
                <br>
                <form action="">
                    <label for="">UNQ Email</label>
                    <input type="email" placeholder="Email(@uvq.edu.ar)" id="mail-input">
                    <br>
                    <label for="">Contraseña</label> <!--Limite de caracteres en la contraseña -->
                    <input type="password" placeholder="Password" id="password-input">
                    <br>
                    <button id="loginBtn" type="submit">Iniciar secion</button>
                </form>
            </div>
            <a id="create-account" href="../html/register.html">Crear cuenta</a>
        </main>
    </div>
    <script src="../js/login.js"></script>
    <script src="../js/layout.js"></script>
</body>
</html>
