<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/home.css">
</head>
<body>
    <div class="app-container">
        <header id="main-header"></header>
        <main>
            <div id="flotante-register">
                <h3>Register</h3>
                <form action="">
                    <label for="">Username</label>
                    <input type="text" placeholder="Username" id="username-input">
                    <br>
                    <label for="">Password</label> <!--Limite de caracteres en la contraseña -->
                    <input type="password" placeholder="Password" id="password-input">
                    <br>
                    <label for="">UNQ Email</label>
                    <input type="email" placeholder="Email(@uvq.edu.ar)" id="mail-input">
                    <br>
                    <button type="submit">Register</button>
                </form>
            </div>
            <a href="../html/login.html">Ya tengo una cuenta</a>
        </main>
    </div>
    <script src="../js/register.js"></script>
    <script src="../js/layout.js"></script>
</body>
</html>
